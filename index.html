<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de adivinhação</title>

    <style>
        body{
            background-color: #121212;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container{
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);

        }
        button{
            background: #00ff88;
            border: none;
            padding: 10px 20px;
            border: 8px;
            cursor: pointer;
            font-weight: bold;


        }
        button:hover{
            background: #00cc6a;

        }
        input{
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;

        }
        #resultado{
            margin-top: 10 px;
            font-size: 18px;
            font-weight: bold;
        }
        img{
            border-radius: 10px;
            width: 200px;
            
        }
        .acertou{
            color: green;

        }
        .maior{
            color: rgb(35, 157, 238);
            
        }
        .menor{
            color: rgb(230, 207, 3);
            
        }
        .perdeu{
            color: rgb(255, 0, 0);
            
        }
        .imgs-corpo{
            display:flex;
           flex-wrap: wrap;
            gap: 10px;
            justify-content: center;


        }
        .imgs-corpo img{
            width: 100px;
            height: 100px;
        }





    </style>
</head>
<body>
    <div class="imgs-corpo">
         <img src="https://media1.tenor.com/m/5BYK-WS0__gAAAAd/cool-fun.gif" alt="gif gato">;
          <img src="https://media1.tenor.com/m/5BYK-WS0__gAAAAd/cool-fun.gif" alt="gif gato">; 
          <img src="https://media1.tenor.com/m/5BYK-WS0__gAAAAd/cool-fun.gif" alt="gif gato">;
         <img src="https://media1.tenor.com/m/5BYK-WS0__gAAAAd/cool-fun.gif" alt="gif gato">;
          <img src="https://media1.tenor.com/m/5BYK-WS0__gAAAAd/cool-fun.gif" alt="gif gato">;
    </div>
    <div class="container">
    <h1> jogo de adivinhação</h1>
    <p> estou pensando em um numero entre 1 e 100. Tente adivinhar!</p>
    <input type="number" id="campoPalpite">
    <button id="botaoEnviar" onclick="vefificarpalpite()"> Enviar Palpite</button> 
    <p id="mensagem"> </p>
    <p> Tentativas Restantes: <span id="tentativas">10</span></p>

    <div id="botaoRecarregar" style="display: none;">
        <button onclick="recarregarPagina()">Jogar Novamente</button>
    </div>

    <img src="https://media1.tenor.com/m/5BYK-WS0__gAAAAd/cool-fun.gif" alt="gif gato">;

    </div>

    <script>
        const numeroAlvo = Math.floor(Math.random() * 100) + 1;

        let tentativasRestantes = 10;

        function vefificarpalpite(){
            const palpite = parseInt(document.getElementById('campoPalpite').value);
            const mensagem = document.getElementById('mensagem');
            const tentativasSpan = document.getElementById('tentativas');
            const botaoRecarregar = document.getElementById('botaoRecarregar');

        function LimparClassesMensagem(){
            mensagem.classList.remove("acertou", "maior", "menor", "perdeu");
        }
    

            if(isNaN(palpite) || palpite <1 || palpite > 100){
                mensagem.textContent = 'Por favor, insira um numero valido entre 1 e 100.';
            }else{
                tentativasRestantes--;
                tentativasSpan.textContent = tentativasRestantes;

                if(palpite === numeroAlvo){
                    mensagem.textContent = `Parabens! Voce acertou o numero ${numeroAlvo}. `;
                    botaoRecarregar.style.display = 'block';
                    mensagem.style.color = 'green';
                    desabilitarEntrada();
                    

                }  else if(palpite < numeroAlvo){
                    mensagem.textContent = 'Tente um numero maior.';
                    LimparClassesMensagem();
                    mensagem.classList.add('maior');
                }
                else if(palpite > numeroAlvo){
                    mensagem.textContent = 'tente numero menor. ';
                    LimparClassesMensagem();
                    mensagem.classList.add('menor');

                }
                if(tentativasRestantes === 0){
                    mensagem.textContent = `Acabaram suas tentativas. O numero correto era ${numeroAlvo}. `;
                    LimparClassesMensagem();
                    mensagem.classList.add('perdeu');
                    desabilitarEntrada();
                    botaoRecarregar.style.display = 'block';
                }
            }
        }
        function desabilitarEntrada(){
            document.getElementById('campoPalpite').disabled = true;
            document.getElementById('botaoEnviar').disabled = true;
        }
        function recarregarPagina(){
            location.reload();
        }
     
    </script>
</body>
</html>
